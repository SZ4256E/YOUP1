<!DOCTYPE html>
<html lang="ar">

<body>

<h1>🛒 متجر الملصقات</h1>

<div id="products"></div>

<h2>🧺 السلة</h2>
<div id="cart"></div>

<button onclick="orderWhatsApp()">اطلب عبر واتساب</button>

</html>
<label for="quantity">العدد:</label>
<input 
  type="number" 
  id="quantity" 
  name="quantity" 
  value="1" 
  min="1"
/>
<p>الثمن: <span id="price">5</span> درهم</p>

<script>
  const quantityInput = document.getElementById("quantity");
  const priceSpan = document.getElementById("price");
  const unitPrice = 5;

  quantityInput.addEventListener("input", () => {
    priceSpan.textContent = quantityInput.value * unitPrice;
  });
</script>
